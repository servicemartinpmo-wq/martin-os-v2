kind = "web"
previewPath = "/"
title = "Tech-Ops by Martin PMO"
version = "1.0.0"
id = "artifacts/techops"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24895
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/techops run dev"

[services.env]
PORT = "24895"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/techops", "run", "build"]
publicDir = "artifacts/techops/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
