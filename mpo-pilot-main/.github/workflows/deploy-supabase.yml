name: Deploy Supabase Brain Layer

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment target environment"
        type: choice
        required: true
        options:
          - staging
          - production
      deploy_functions:
        description: "Deploy edge functions"
        type: boolean
        default: true
      deploy_migrations:
        description: "Apply SQL migrations"
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - "mpo-pilot-main/supabase/**"
      - "mpo-pilot-main/scripts/deploy-supabase.sh"
      - "mpo-pilot-main/scripts/run-migrations.js"
      - "mpo-pilot-main/.github/workflows/deploy-supabase.yml"

concurrency:
  group: supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.environment || 'production' }}
    defaults:
      run:
        working-directory: mpo-pilot-main
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mpo-pilot-main/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify required deployment secrets
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            exit 1
          fi
          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            exit 1
          fi

      - name: Apply migrations and deploy functions
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          SERVICE_ROLE_JWT: ${{ secrets.SERVICE_ROLE_JWT }}
          EDGE_INVOKE_JWT: ${{ secrets.EDGE_INVOKE_JWT }}
          DEPLOY_MIGRATIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_migrations || 'true' }}
          DEPLOY_FUNCTIONS: ${{ github.event_name == 'workflow_dispatch' && inputs.deploy_functions || 'true' }}
        run: |
          if [ "${DEPLOY_MIGRATIONS}" = "true" ]; then
            npm run supabase:migrate
          else
            echo "Skipping migrations by input flag."
          fi
          if [ "${DEPLOY_FUNCTIONS}" = "true" ]; then
            npm run supabase:deploy
          else
            echo "Skipping function deploy by input flag."
          fi
