openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Tech-Ops by Martin PMO API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: Auth
    description: Browser and mobile authentication endpoints.
  - name: apphia
    description: Apphia Engine chat, image, and audio operations
  - name: cases
    description: Diagnostic case operations
  - name: stripe
    description: Stripe subscription and billing operations
  - name: dashboard
    description: Dashboard and analytics endpoints
  - name: connectors
    description: Connector health monitoring
  - name: automation
    description: Automation center operations
  - name: preferences
    description: Preferences quiz operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /auth/user:
    get:
      tags: [Auth]
      operationId: getCurrentAuthUser
      summary: Get the currently authenticated user
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '200':
          description: Auth status resolved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserEnvelope'
  /login:
    get:
      tags: [Auth]
      operationId: beginBrowserLogin
      summary: Start the browser OIDC login flow
      parameters:
        - name: returnTo
          in: query
          required: false
          schema:
            type: string
      responses:
        '302':
          description: Redirect to the OIDC authorization endpoint.
  /callback:
    get:
      tags: [Auth]
      operationId: handleBrowserLoginCallback
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
        - name: iss
          in: query
          required: false
          schema:
            type: string
            format: uri
      responses:
        '302':
          description: Redirect on completion.
  /logout:
    get:
      tags: [Auth]
      operationId: logoutBrowserSession
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
        - $ref: '#/components/parameters/SessionCookie'
      responses:
        '302':
          description: Redirect to OIDC provider logout URL.
  /mobile-auth/token-exchange:
    post:
      tags: [Auth]
      operationId: exchangeMobileAuthorizationCode
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileTokenExchangeRequest'
      responses:
        '200':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileTokenExchangeSuccess'
        '400':
          description: Invalid fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /mobile-auth/logout:
    post:
      tags: [Auth]
      operationId: logoutMobileSession
      parameters:
        - $ref: '#/components/parameters/AuthorizationSessionHeader'
      responses:
        '200':
          description: Logout processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogoutSuccess'
  /apphia/conversations:
    get:
      operationId: listOpenaiConversations
      tags: [apphia]
      summary: List all conversations
      responses:
        "200":
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiConversation"
    post:
      operationId: createOpenaiConversation
      tags: [apphia]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOpenaiConversationBody"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversation"
  /apphia/conversations/{id}:
    get:
      operationId: getOpenaiConversation
      tags: [apphia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiConversationWithMessages"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
    delete:
      operationId: deleteOpenaiConversation
      tags: [apphia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenaiError"
  /apphia/conversations/{id}/messages:
    get:
      operationId: listOpenaiMessages
      tags: [apphia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OpenaiMessage"
    post:
      operationId: sendOpenaiMessage
      tags: [apphia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiMessageBody"
      responses:
        "200":
          description: SSE stream of assistant text chunks
          content:
            text/event-stream: {}
  /apphia/conversations/{id}/voice-messages:
    post:
      operationId: sendOpenaiVoiceMessage
      tags: [apphia]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendOpenaiVoiceMessageBody"
      responses:
        "200":
          description: SSE stream of transcript and audio chunks
          content:
            text/event-stream: {}
  /apphia/generate-image:
    post:
      operationId: generateOpenaiImage
      tags: [apphia]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateOpenaiImageBody"
      responses:
        "200":
          description: Generated image data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateOpenaiImageResponse"
  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List user diagnostic cases
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, resolved, closed]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DiagnosticCase"
    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new diagnostic case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseBody"
      responses:
        "201":
          description: Created case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticCase"
  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticCase"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
    patch:
      operationId: updateCase
      tags: [cases]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseBody"
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DiagnosticCase"
  /cases/{id}/diagnose:
    post:
      operationId: runDiagnostic
      tags: [cases]
      summary: Run Apphia diagnostic pipeline on a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: SSE stream of diagnostic progress
          content:
            text/event-stream: {}
  /cases/batch:
    post:
      operationId: runBatchDiagnostics
      tags: [cases]
      summary: Run parallel batch diagnostics on multiple cases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchDiagnosticsBody"
      responses:
        "200":
          description: SSE stream of batch progress
          content:
            text/event-stream: {}
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"
  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"
  /connectors/health:
    get:
      operationId: listConnectorHealth
      tags: [connectors]
      summary: Get health status of all connectors
      responses:
        "200":
          description: Connector health statuses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConnectorHealthStatus"
  /connectors/health/{name}/poll:
    post:
      operationId: pollConnectorHealth
      tags: [connectors]
      summary: Poll a specific connector for health
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectorHealthStatus"
  /automation/rules:
    get:
      operationId: listAutomationRules
      tags: [automation]
      summary: List all automation rules
      responses:
        "200":
          description: List of rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutomationRuleResponse"
    post:
      operationId: createAutomationRule
      tags: [automation]
      summary: Create an automation rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAutomationRuleBody"
      responses:
        "201":
          description: Created rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRuleResponse"
  /automation/rules/{id}:
    patch:
      operationId: updateAutomationRule
      tags: [automation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAutomationRuleBody"
      responses:
        "200":
          description: Updated rule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutomationRuleResponse"
    delete:
      operationId: deleteAutomationRule
      tags: [automation]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
  /preferences/quiz:
    get:
      operationId: getPreferencesQuiz
      tags: [preferences]
      summary: Get preferences quiz questions
      responses:
        "200":
          description: Quiz questions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesQuizQuestions"
    post:
      operationId: submitPreferencesQuiz
      tags: [preferences]
      summary: Submit preferences quiz answers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitPreferencesQuizBody"
      responses:
        "200":
          description: Quiz profile result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesProfile"
  /preferences/profile:
    get:
      operationId: getPreferencesProfile
      tags: [preferences]
      summary: Get user preferences profile
      responses:
        "200":
          description: User preferences profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreferencesProfile"
  /stripe/products:
    get:
      operationId: listStripeProducts
      tags: [stripe]
      summary: List subscription products with prices
      responses:
        "200":
          description: Products with prices
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StripeProductsResponse"
  /stripe/checkout:
    post:
      operationId: createCheckoutSession
      tags: [stripe]
      summary: Create a checkout session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutBody"
      responses:
        "200":
          description: Checkout URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutSessionResponse"
  /stripe/subscription:
    get:
      operationId: getSubscription
      tags: [stripe]
      summary: Get current user subscription
      responses:
        "200":
          description: Subscription details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SubscriptionResponse"
  /stripe/portal:
    post:
      operationId: createPortalSession
      tags: [stripe]
      summary: Create a billing portal session
      responses:
        "200":
          description: Portal URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalSessionResponse"
  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      summary: List all batches for the authenticated user
      responses:
        "200":
          description: Array of batches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Batch"
    post:
      operationId: createBatch
      tags: [batches]
      summary: Create and start a new batch diagnostic run
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, caseIds]
              properties:
                name:
                  type: string
                caseIds:
                  type: array
                  items:
                    type: integer
      responses:
        "201":
          description: Created batch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "403":
          description: Feature not available or quota exceeded
        "429":
          description: Concurrency limit reached
  /batches/{id}:
    get:
      operationId: getBatch
      tags: [batches]
      summary: Get a batch by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch detail with cases
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "404":
          description: Batch not found
  /batches/{id}/progress:
    get:
      operationId: getBatchProgress
      tags: [batches]
      summary: Get live progress for a running batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Batch progress snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BatchProgress"
  /batches/{id}/cancel:
    post:
      operationId: cancelBatch
      tags: [batches]
      summary: Cancel all pending cases in a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated batch
        "404":
          description: Batch not found
  /batches/{id}/cases:
    post:
      operationId: addCasesToBatch
      tags: [batches]
      summary: Add cases to a running or paused batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [caseIds]
              properties:
                caseIds:
                  type: array
                  items:
                    type: integer
      responses:
        "201":
          description: Cases added successfully
        "404":
          description: Batch not found
        "409":
          description: Batch is completed or cancelled
  /batches/{id}/cases/{caseId}/pause:
    post:
      operationId: pauseBatchCase
      tags: [batches]
      summary: Pause a pending case in a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case paused
        "404":
          description: Case not found or not pausable
  /batches/{id}/cases/{caseId}/cancel:
    post:
      operationId: cancelBatchCase
      tags: [batches]
      summary: Cancel a pending or paused case in a batch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case cancelled
        "404":
          description: Case not found or not cancellable
  /batches/{id}/cases/{caseId}/retry:
    post:
      operationId: retryBatchCase
      tags: [batches]
      summary: Retry a failed, cancelled, or paused batch case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: caseId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Case reset to pending
        "404":
          description: Case not found or not retriable
  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List system alerts for the authenticated user
      parameters:
        - name: acknowledged
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Array of system alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SystemAlert"
  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Mark a system alert as acknowledged
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Alert acknowledged
        "404":
          description: Alert not found
components:
  parameters:
    AuthorizationSessionHeader:
      name: Authorization
      in: header
      required: false
      schema:
        type: string
    SessionCookie:
      name: sid
      in: cookie
      required: false
      schema:
        type: string
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AuthUser:
      type: object
      required: [id, email, firstName, lastName, profileImageUrl]
      properties:
        id:
          type: string
        email:
          type: [string, 'null']
          format: email
        firstName:
          type: [string, 'null']
        lastName:
          type: [string, 'null']
        profileImageUrl:
          type: [string, 'null']
    AuthUserEnvelope:
      type: object
      required: [user]
      properties:
        user:
          oneOf:
            - $ref: '#/components/schemas/AuthUser'
            - type: 'null'
    MobileTokenExchangeRequest:
      type: object
      required: [code, code_verifier, redirect_uri, state]
      properties:
        code:
          type: string
          minLength: 1
        code_verifier:
          type: string
          minLength: 1
        redirect_uri:
          type: string
          minLength: 1
          format: uri
        state:
          type: string
          minLength: 1
        nonce:
          type: string
          minLength: 1
    MobileTokenExchangeSuccess:
      type: object
      required: [token]
      properties:
        token:
          type: string
    LogoutSuccess:
      type: object
      required: [success]
      properties:
        success:
          type: boolean
          const: true
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
    OpenaiConversation:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - createdAt
    OpenaiMessage:
      type: object
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
        content:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - conversationId
        - role
        - content
        - createdAt
    CreateOpenaiConversationBody:
      type: object
      properties:
        title:
          type: string
      required:
        - title
    SendOpenaiMessageBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content
    SendOpenaiVoiceMessageBody:
      type: object
      properties:
        audio:
          type: string
      required:
        - audio
    OpenaiConversationWithMessages:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        createdAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: "#/components/schemas/OpenaiMessage"
      required:
        - id
        - title
        - createdAt
        - messages
    GenerateOpenaiImageBody:
      type: object
      properties:
        prompt:
          type: string
        size:
          type: string
          enum: ["1024x1024", "512x512", "256x256"]
      required:
        - prompt
    GenerateOpenaiImageResponse:
      type: object
      properties:
        b64_json:
          type: string
      required:
        - b64_json
    OpenaiError:
      type: object
      properties:
        error:
          type: string
      required:
        - error
    DiagnosticCase:
      type: object
      required: [id, userId, title, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: string
        title:
          type: string
        description:
          type: [string, 'null']
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        priority:
          type: [string, 'null']
        diagnosticTier:
          type: [integer, 'null']
        rootCause:
          type: [string, 'null']
        resolution:
          type: [string, 'null']
        signals:
          type: ['object', 'null']
        udoPath:
          type: ['object', 'null']
        confidenceScore:
          type: [integer, 'null']
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        resolvedAt:
          type: [string, 'null']
          format: date-time
    CreateCaseBody:
      type: object
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        priority:
          type: string
          enum: [low, medium, high, critical]
    UpdateCaseBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        priority:
          type: string
          enum: [low, medium, high, critical]
